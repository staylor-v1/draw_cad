image: training_data/gdt/threaded_cap.jpg
notes:
  - Dense threaded-cap drawing with two main projections and many callouts.
  - The section view contains repeated thread representation lines that are part geometry, not callouts.
  - Thread texture should be treated as a negative example for callout masking.
projections:
  - id: left_profile
    label: left exterior profile projection
    axis: left_profile
    crop: {x: 0.176, y: 0.205, w: 0.254, h: 0.565}
  - id: section_a_a
    label: section A-A projection
    axis: section
    crop: {x: 0.634, y: 0.204, w: 0.236, h: 0.653}
non_callout_regions:
