# Loop 2 meta-optimizer configuration
optimizer:
  max_iterations: 20
  convergence_threshold: 0.01
  convergence_patience: 3
  candidate_count: 3

parameter_search:
  temperature:
    min: 0.0
    max: 1.0
    step: 0.1
  max_retries:
    values: [1, 2, 3, 5]
  fewshot_count:
    values: [0, 1, 2, 3, 5]
  ocr_enabled:
    values: [true, false]

prompt_optimization:
  enabled: true
  max_patch_length: 500
  patch_strategies:
    - "add_constraint"
    - "add_example_pattern"
    - "clarify_ambiguity"
    - "add_error_prevention"

fewshot_optimization:
  enabled: true
  selection_strategies:
    - "fixed"
    - "random"
    - "coverage"
    - "failure_targeted"
    - "similarity"

training_data:
  root_dir: "training_data"
  manifest_path: "training_data/manifest.json"
  rendered_png_dir: "training_data/rendered_png"
  sample_size: 20
  sampling_strategy: "stratified"
  sentinel_count: 5

curriculum:
  enabled: true
  phases:
    - name: "foundation"
      tiers: [1]
      sample_size: 15
      min_score_to_advance: 0.6
      max_iterations: 5
    - name: "intermediate"
      tiers: [1, 2]
      sample_size: 20
      min_score_to_advance: 0.5
      max_iterations: 8
    - name: "advanced"
      tiers: [1, 2, 3]
      sample_size: 25
      min_score_to_advance: 0.4
      max_iterations: 10
