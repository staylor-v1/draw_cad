# Default configuration for drawing-to-cad pipeline
pipeline:
  max_retries: 3
  retry_backoff_factor: 1.5
  execution_timeout: 60
  ocr_enabled: true
  default_unit: "mm"
  default_tolerance: 0.1

models:
  vision:
    name: "llama-3.2-11b-Vision"
    backend: "ollama"
    temperature: 0.1
    max_tokens: 4096
  reasoning:
    name: "gpt-oss-120b"
    backend: "ollama"
    temperature: 0.2
    max_tokens: 8192

inference:
  ollama:
    base_url: "http://localhost:11434"
    timeout: 120
  vllm:
    base_url: "http://localhost:8000"
    timeout: 120
  llamacpp:
    base_url: "http://localhost:8080"
    timeout: 120

evaluation:
  weights:
    dimension_fidelity: 0.30
    feature_recall: 0.25
    bounding_box_iou: 0.15
    volume_ratio: 0.10
    geometry_valid: 0.10
    feature_precision: 0.05
    retry_efficiency: 0.05
  dimension_tolerance_mm: 0.5
  volume_tolerance_ratio: 0.05

prompts:
  system_prompt: "prompts/system_prompt.md"
  vision_prompt: "prompts/vision_prompt.md"
  retry_prompt: "prompts/retry_prompt.md"
  validation_prompt: "prompts/validation_prompt.md"
  reconciliation_prompt: "prompts/reconciliation_prompt.md"
  fewshot_index: "prompts/fewshot_examples/index.yaml"

output:
  default_step_path: "output.step"
  experiments_dir: "experiments"
